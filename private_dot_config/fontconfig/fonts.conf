<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">

<fontconfig>

  <!-- ========================================================= -->
  <!-- 0. Global rendering options                               -->
  <!-- ========================================================= -->

  <match target="font">
    <edit name="antialias" mode="assign">
      <bool>true</bool>
    </edit>
    <edit name="hinting" mode="assign">
      <bool>true</bool>
    </edit>
    <edit name="hintstyle" mode="assign">
      <const>hintslight</const>
    </edit>
    <edit name="rgba" mode="assign">
      <const>rgb</const>
    </edit>
    <edit name="lcdfilter" mode="assign">
      <const>lcddefault</const>
    </edit>
  </match>


  <!-- ========================================================= -->
  <!-- 1. Reject legacy bitmap / Windows .fon fonts              -->
  <!--    This is important because cvgasys.fon / System Regular -->
  <!--    may hijack system-ui matching.                         -->
  <!-- ========================================================= -->

  <selectfont>
    <rejectfont>
      <glob>*.fon</glob>
    </rejectfont>
    <rejectfont>
      <glob>*.FON</glob>
    </rejectfont>
    <rejectfont>
      <pattern>
        <patelt name="scalable">
          <bool>false</bool>
        </patelt>
      </pattern>
    </rejectfont>
  </selectfont>


  <!-- ========================================================= -->
  <!-- 2. Generic family aliases                                 -->
  <!-- ========================================================= -->

  <!-- sans-serif: Latin first, then Simplified Chinese, Traditional Chinese, Japanese/Korean fallback, emoji -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Inter</family>
      <family>Noto Sans CJK SC</family>
      <family>PingFang SC</family>
      <family>Microsoft YaHei UI</family>
      <family>Microsoft YaHei</family>
      <family>WenQuanYi Zen Hei</family>
      <family>Noto Sans CJK TC</family>
      <family>Noto Sans CJK HK</family>
      <family>Noto Sans CJK JP</family>
      <family>Noto Sans CJK KR</family>
      <family>Apple Color Emoji</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias>
    <family>serif</family>
    <prefer>
      <family>Noto Serif</family>
      <family>Noto Serif CJK SC</family>
      <family>Songti SC</family>
      <family>SimSun</family>
      <family>Noto Serif CJK TC</family>
      <family>Noto Serif CJK JP</family>
      <family>Apple Color Emoji</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias>
    <family>monospace</family>
    <prefer>
      <family>Maple Mono NF CN</family>
      <family>JetBrains Mono</family>
      <family>Sarasa Mono SC</family>
      <family>Noto Sans Mono CJK SC</family>
      <family>Microsoft YaHei Mono</family>
      <family>Apple Color Emoji</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>


  <!-- ========================================================= -->
  <!-- 3. system-ui fix                                         -->
  <!--    Many websites and Firefox UI use system-ui.            -->
  <!--    Do NOT allow "System" / .fon fonts to win.             -->
  <!-- ========================================================= -->

  <alias>
    <family>system-ui</family>
    <prefer>
      <family>Inter</family>
      <family>Noto Sans CJK SC</family>
      <family>PingFang SC</family>
      <family>Microsoft YaHei UI</family>
      <family>Microsoft YaHei</family>
      <family>Apple Color Emoji</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <match target="pattern">
    <test name="family" qual="any">
      <string>system-ui</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Inter</string>
    </edit>
    <edit name="family" mode="append" binding="strong">
      <string>Noto Sans CJK SC</string>
    </edit>
  </match>


  <!-- ========================================================= -->
  <!-- 4. Chinese language-specific fallback                     -->
  <!--    Force zh-cn to use proper CJK fonts before old fonts.  -->
  <!-- ========================================================= -->

  <match target="pattern">
    <test name="lang" compare="contains">
      <string>zh-cn</string>
    </test>
    <test name="family" qual="any">
      <string>sans-serif</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Noto Sans CJK SC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang" compare="contains">
      <string>zh-cn</string>
    </test>
    <test name="family" qual="any">
      <string>serif</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Noto Serif CJK SC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang" compare="contains">
      <string>zh-cn</string>
    </test>
    <test name="family" qual="any">
      <string>monospace</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Maple Mono NF CN</string>
    </edit>
  </match>


  <!-- ========================================================= -->
  <!-- 5. Prevent bad family names from hijacking matching       -->
  <!-- ========================================================= -->

  <alias binding="strong">
    <family>System</family>
    <prefer>
      <family>Inter</family>
      <family>Noto Sans CJK SC</family>
    </prefer>
  </alias>

  <alias binding="strong">
    <family>MS Sans Serif</family>
    <prefer>
      <family>Inter</family>
      <family>Noto Sans CJK SC</family>
    </prefer>
  </alias>

  <alias binding="strong">
    <family>Microsoft Sans Serif</family>
    <prefer>
      <family>Inter</family>
      <family>Noto Sans CJK SC</family>
    </prefer>
  </alias>


  <!-- ========================================================= -->
  <!-- 6. Common web font aliases                                -->
  <!-- ========================================================= -->

  <alias>
    <family>-apple-system</family>
    <prefer>
      <family>Inter</family>
      <family>Noto Sans CJK SC</family>
    </prefer>
  </alias>

  <alias>
    <family>BlinkMacSystemFont</family>
    <prefer>
      <family>Inter</family>
      <family>Noto Sans CJK SC</family>
    </prefer>
  </alias>

  <alias>
    <family>Segoe UI</family>
    <prefer>
      <family>Inter</family>
      <family>Noto Sans CJK SC</family>
    </prefer>
  </alias>


  <!-- ========================================================= -->
  <!-- 7. Emoji                                                  -->
  <!-- ========================================================= -->

  <alias>
    <family>emoji</family>
    <prefer>
      <family>Apple Color Emoji</family>
      <family>Noto Color Emoji</family>
      <family>Segoe UI Emoji</family>
    </prefer>
  </alias>

</fontconfig>
